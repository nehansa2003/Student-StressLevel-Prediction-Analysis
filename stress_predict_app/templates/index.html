<!DOCTYPE html>
<html lang="en">
<head>
    <title>Student Stress Predictor</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #eef2f3, #dfe9f3);
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .main-container {
            flex: 1;
        }

        .card {
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        button {
            font-size: 16px;
        }

        #result {
            text-align: center;
            font-size: 18px;
            margin-top: 20px;
        }

        footer {
            background: #222;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 30px;
        }
    </style>
</head>

<body>

<!-- Header -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand mb-0 h1">🎓 Student Stress Level Predictor</span>
    </div>
</nav>

<div class="container main-container mt-5">

    <div class="card mx-auto p-4" style="max-width:500px;">

        <h3 class="text-center mb-4">Predict Your Stress Level</h3>

        <label class="form-label"><b>Sleep Quality (0–5)</b></label>
        <select id="sleep_quality" class="form-select">
            <option value="0">Very Poor</option>
            <option value="1">Poor</option>
            <option value="2">Average</option>
            <option value="3">Good</option>
            <option value="4">Very Good</option>
            <option value="5">Excellent</option>
        </select>

        <label class="form-label mt-3"><b>Headaches per Week (0–5)</b></label>
        <select id="headaches" class="form-select">
            <option value="0">Never</option>
            <option value="1">Rare</option>
            <option value="2">Sometimes</option>
            <option value="3">Often</option>
            <option value="4">Very Often</option>
            <option value="5">Always</option>
        </select>

        <label class="form-label mt-3"><b>Academic Performance (1–5)</b></label>
        <select id="academic_performance" class="form-select">
            <option value="1">Very Low</option>
            <option value="2">Low</option>
            <option value="3">Average</option>
            <option value="4">Good</option>
            <option value="5">Excellent</option>
        </select>

        <label class="form-label mt-3"><b>Study Load (1–5)</b></label>
        <select id="study_load" class="form-select">
            <option value="1">Very Light</option>
            <option value="2">Light</option>
            <option value="3">Moderate</option>
            <option value="4">Heavy</option>
            <option value="5">Very Heavy</option>
        </select>

        <label class="form-label mt-3"><b>Extracurricular Activities (0–5)</b></label>
        <select id="extracurricular" class="form-select">
            <option value="0">None</option>
            <option value="1">Rare</option>
            <option value="2">Occasional</option>
            <option value="3">Regular</option>
            <option value="4">Frequent</option>
            <option value="5">Very Frequent</option>
        </select>

        <button class="btn btn-success mt-4 w-100" onclick="predictStress()">
            Check My Stress Level
        </button>

        <div id="result"></div>

    </div>

</div>

<!-- Footer -->
<footer>
    <small>
        Student Stress Prediction System • Machine Learning Application
    </small>
</footer>

<script>
function predictStress() {
    const data = {
        sleep_quality: document.getElementById("sleep_quality").value,
        headaches: document.getElementById("headaches").value,
        academic_performance: document.getElementById("academic_performance").value,
        study_load: document.getElementById("study_load").value,
        extracurricular: document.getElementById("extracurricular").value
    };

    fetch("/predict", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    })
    .then(response => response.json())
    .then(result => {
        document.getElementById("result").innerHTML =
            `<b>Stress Level:</b> ${result.stress_level} <br>
             <b>Stress Score:</b> ${result.stress_value}`;
    });
}
</script>

</body>
</html>
